# Dashboard - unified dashboard for all cluster services
# Shows live health status, Prometheus widgets, and quick links
# Stateless config via ConfigMaps - no PVC needed
# Web UI available at http://pi-cluster.local
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
# ============================================================
#  Service Account - Dashboard needs read access to discover
#  services and ingresses across namespaces
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dashboard
rules:
  - apiGroups: [""]
    resources: [namespaces, pods, nodes, services, endpoints]
    verbs: [get, list]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: [ingresses]
    verbs: [get, list]
  - apiGroups: ["apps"]
    resources: [deployments, statefulsets, daemonsets]
    verbs: [get, list]
  - apiGroups: ["metrics.k8s.io"]
    resources: [pods, nodes]
    verbs: [get, list]
  - apiGroups: ["traefik.io", "traefik.containo.us"]
    resources: [ingressroutes]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dashboard
subjects:
  - kind: ServiceAccount
    name: dashboard
    namespace: monitoring
---
# ============================================================
#  Configuration - services, widgets, bookmarks, settings
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-config
  namespace: monitoring
data:
  kubernetes.yaml: |
    mode: cluster

  settings.yaml: |
    title: Pi Cluster
    favicon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/raspberry-pi.svg
    headerStyle: clean
    layout:
      Monitoring:
        style: row
        columns: 3
      Local Apps:
        style: row
        columns: 3
      Public Apps:
        style: row
        columns: 3

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "Pi Cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

  services.yaml: |
    - Monitoring:
        - Grafana:
            icon: grafana
            href: http://pi-cluster.local:30030
            description: Cluster monitoring
        - Portainer:
            icon: portainer
            href: http://pi-cluster.local:30900
            description: Container management

    - Local Apps:
        - OpenClaw:
            icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/openclaw.png
            href: http://pi-cluster.local:30789
            description: AI assistant agent
        - AdGuard Home:
            icon: adguard-home
            href: http://pi-cluster.local:30303
            description: DNS ad blocker

    - Public Apps:
        - Guacamole:
            icon: guacamole
            href: https://remote.swirlit.dev
            description: Remote desktop gateway
        - Open WebUI:
            icon: open-webui
            href: https://ai.swirlit.dev
            description: AI chatbot interface

  bookmarks.yaml: |
    - Management:
        - GitHub Repo:
            - icon: github
              href: https://github.com/chefzaid/pi-cluster
        - Cloudflare Dashboard:
            - icon: cloudflare
              href: https://one.dash.cloudflare.com/
        - Tailscale Admin:
            - icon: tailscale
              href: https://login.tailscale.com/admin/machines
        - OpenRouter Keys:
            - icon: https://openrouter.ai/favicon.ico
              href: https://openrouter.ai/keys

  docker.yaml: ""
  custom.css: ""
  custom.js: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      serviceAccountName: dashboard
      terminationGracePeriodSeconds: 10
      initContainers:
        - name: init-config
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "cp /configmap/* /app-config/ && mkdir -p /app-config/logs"]
          volumeMounts:
            - name: configmap
              mountPath: /configmap
            - name: config
              mountPath: /app-config
      containers:
        - name: dashboard
          image: ghcr.io/gethomepage/homepage:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "*"    # Allow all hosts (internal service behind ingress)
          volumeMounts:
            - name: config
              mountPath: /app/config
          resources:
            requests:
              memory: "96Mi"
              cpu: "15m"
            limits:
              memory: "256Mi"
              cpu: "150m"
          startupProbe:
            httpGet:
              path: /api/healthcheck
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: 3000
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: configmap
          configMap:
            name: dashboard-config
        - name: config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: monitoring
spec:
  selector:
    app: dashboard
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard-ingress
  namespace: monitoring
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: pi-cluster.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-service
                port:
                  number: 80
