# OpenClaw - personal AI assistant gateway
# Single-instance gateway that connects to messaging platforms
# (WhatsApp, Telegram, Slack, Discord, etc.) and cloud LLM APIs
# Web UI available at http://openclaw.local (LAN)
# Docs: https://docs.openclaw.ai/
#
# Pre-requisite: create the secret with your API keys + gateway token:
#
#   kubectl create secret generic openclaw-env-secret -n ai \
#     --from-literal=OPENCLAW_GATEWAY_TOKEN=<PICK_A_STRONG_TOKEN> \
#     --from-literal=OPENROUTER_API_KEY=sk-or-v1-xxx
#
# Add more keys as needed (OPENAI_API_KEY, TELEGRAM_BOT_TOKEN, etc.)
#
# Note: OpenClaw is single-instance by design (WebSocket state, session store).
# It cannot scale horizontally. The pod can schedule on any node - OpenEBS
# LocalPV binds storage to the node where the pod first lands.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-pvc
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: ai
data:
  openclaw.json: |
    {
      "gateway": {
        "port": 18789,
        "mode": "local",
        "bind": "lan",
        "trustedProxies": ["0.0.0.0/0", "::/0"],
        "controlUi": {
          "enabled": true,
          "dangerouslyDisableDeviceAuth": true,
          "allowInsecureAuth": true,
          "dangerouslyAllowHostHeaderOriginFallback": true
        }
      },
      "channels": {
        "whatsapp": {
          "enabled": true,
          "dmPolicy": "pairing"
        }
      },
      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace",
          "model": {
            "primary": "openrouter/moonshotai/kimi-k2.5"
          }
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate          # PVC is ReadWriteOnce - can't have two pods
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      terminationGracePeriodSeconds: 10
      initContainers:
        # Seed config from ConfigMap into PVC on every startup
        - name: init-config
          image: ghcr.io/openclaw/openclaw:2026.2.26
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /home/node/.openclaw/workspace
              echo "Seeding config from ConfigMap (always overwrite)"
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.2.26
          imagePullPolicy: IfNotPresent
          command: ["node", "dist/index.js"]
          args: ["gateway"]
          ports:
            - name: http
              containerPort: 18789
              protocol: TCP
          envFrom:
            - secretRef:
                name: openclaw-env-secret
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
            - name: tmp
              mountPath: /tmp
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1024"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1500m"
          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-pvc
        - name: config
          configMap:
            name: openclaw-config
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-service
  namespace: ai
spec:
  type: NodePort
  selector:
    app: openclaw
  ports:
    - protocol: TCP
      port: 80
      targetPort: 18789
      nodePort: 30789
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-ingress
  namespace: ai
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: openclaw.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openclaw-service
                port:
                  number: 80
